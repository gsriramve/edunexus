# External Secrets configuration
# Requires External Secrets Operator installed in cluster
# https://external-secrets.io/

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: edunexus-api
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: edunexus-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: edunexus-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: edunexus-production/api
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: edunexus-production/api
        property: REDIS_URL
    - secretKey: CLERK_SECRET_KEY
      remoteRef:
        key: edunexus-production/api
        property: CLERK_SECRET_KEY
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: edunexus-production/api
        property: RAZORPAY_KEY_ID
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: edunexus-production/api
        property: RAZORPAY_KEY_SECRET
    - secretKey: RAZORPAY_WEBHOOK_SECRET
      remoteRef:
        key: edunexus-production/api
        property: RAZORPAY_WEBHOOK_SECRET
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: edunexus-production/api
        property: SENDGRID_API_KEY
    - secretKey: MSG91_AUTH_KEY
      remoteRef:
        key: edunexus-production/api
        property: MSG91_AUTH_KEY
    - secretKey: FIREBASE_PROJECT_ID
      remoteRef:
        key: edunexus-production/api
        property: FIREBASE_PROJECT_ID
    - secretKey: FIREBASE_CLIENT_EMAIL
      remoteRef:
        key: edunexus-production/api
        property: FIREBASE_CLIENT_EMAIL
    - secretKey: FIREBASE_PRIVATE_KEY
      remoteRef:
        key: edunexus-production/api
        property: FIREBASE_PRIVATE_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: edunexus-web-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: edunexus-web-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      remoteRef:
        key: edunexus-production/web
        property: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    - secretKey: CLERK_SECRET_KEY
      remoteRef:
        key: edunexus-production/web
        property: CLERK_SECRET_KEY
    - secretKey: NEXT_PUBLIC_RAZORPAY_KEY_ID
      remoteRef:
        key: edunexus-production/web
        property: NEXT_PUBLIC_RAZORPAY_KEY_ID
