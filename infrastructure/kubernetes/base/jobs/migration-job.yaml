apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  labels:
    app: edunexus
    component: migration
  annotations:
    # This annotation ensures the job runs before deployments
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: edunexus
        component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: edunexus-api
      containers:
        - name: migrate
          image: edunexus-api:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: edunexus-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
