name: Sanity Test

on:
  workflow_dispatch:  # Manual trigger from GitHub mobile/web
    inputs:
      target_url:
        description: 'Target URL to test (default: https://edu-nexus.co.in)'
        required: false
        default: 'https://edu-nexus.co.in'
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC = 8:30 AM IST daily

jobs:
  sanity-test:
    name: Run QA Persona Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Install dependencies
        run: npm install playwright

      - name: Run sanity tests
        run: npm run test:sanity
        env:
          CI: true

      - name: Upload QA Report (Markdown)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-md
          path: QA-Test-Report.md
          retention-days: 30

      - name: Upload QA Report (JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-json
          path: QA-Test-Results.json
          retention-days: 30

      - name: Display Test Summary
        if: always()
        run: |
          echo "## QA Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "QA-Test-Report.md" ]; then
            # Extract summary table from report
            sed -n '/## Summary/,/## Detailed/p' QA-Test-Report.md | head -20 >> $GITHUB_STEP_SUMMARY
          else
            echo "Report not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check test results
        run: |
          if [ -f "QA-Test-Results.json" ]; then
            # Count passed personas (login success and all pages passed)
            PASSED=$(node -e "
              const results = require('./QA-Test-Results.json');
              const passed = results.filter(r => r.loginSuccess && r.pages.every(p => p.success)).length;
              console.log(passed);
            ")
            TOTAL=$(node -e "
              const results = require('./QA-Test-Results.json');
              console.log(results.length);
            ")
            echo "Passed: $PASSED / $TOTAL personas"
            if [ "$PASSED" -lt "$TOTAL" ]; then
              echo "::warning::Some persona tests failed. Check the QA report for details."
            fi
          fi
