name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=@edunexus/database

      - name: Build packages
        run: npm run build

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  # Database migration validation
  validate-migrations:
    name: Validate Database Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: edunexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma Schema
        run: npx prisma validate
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/edunexus_test

      - name: Check Migration Status
        run: npx prisma migrate status
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/edunexus_test

      - name: Apply Migrations (Test)
        run: npx prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/edunexus_test

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/edunexus_test

      - name: Verify Schema Sync
        run: |
          # Ensure no drift between schema and migrations
          npx prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-migrations prisma/migrations \
            --shadow-database-url postgresql://test:test@localhost:5432/edunexus_shadow \
            --exit-code || echo "Schema drift detected - please review"
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/edunexus_test

  python-lint:
    name: Python Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ml-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/ml-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Run linting with Ruff
        run: ruff check app/

      - name: Run tests
        run: pytest tests/ -v || echo "No tests yet"
